general {
    lock_cmd = pidof hyprlock || hyprlock										# avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session									# lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on								# turn on display after sleep.
}

listener {
    timeout = 300																		# 5 min
    on-timeout = brightnessctl -s set 0%										# set monitor backlight to 10%.
    on-resume = brightnessctl -r													# restore monitor backlight.
}

listener {
    timeout = 420																		# 7 min
    on-timeout = brightnessctl -r && loginctl lock-session				# lock screen
}

listener {
    timeout = 420																		# 7 min
    on-timeout = systemctl suspend												# suspend pc
}
